
services:

  db:
    profiles: ["app"]
    container_name: ${T51DB_SERVER}
    image: ${T51DB_IMAGE}
    command: ["postgres", "-c", "log_statement=all"]
    networks:
      t51Net:
        ipv4_address: ${T51DB_IP}
    ports:
      - "${T51DB_PORT}:5432"
    volumes:
      - ${T51DB_VOLUME}:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${T51DB_SCHEMA}
      - POSTGRES_USER=${T51DB_USER}
      - POSTGRES_PASSWORD=${T51DB_PASS}
    healthcheck:
      test: ["CMD-SHELL", "PGDATABASE=${T51DB_SCHEMA} pg_isready -U ${T51DB_USER} -h localhost"]
      interval: 20s
      timeout: 5s
      retries: 5


  back:
    profiles: ["app"]
    container_name: ${T51Back_Server}
    build: ./back
    image: ${T51Back_IMAGE}
    expose:
      - "8080"
    environment:
      - VIRTUAL_HOST=api.${MY_DOMAIN}
      - LETSENCRYPT_HOST=api.${MY_DOMAIN}
      - LETSENCRYPT_EMAIL=${MY_EMAIL}
      - VIRTUAL_PORT=8080
      # DB connection data
      - T51DB_SERVER=${T51DB_SERVER}
      - T51DB_SCHEMA=${T51DB_SCHEMA}
      - T51DB_USER=${T51DB_USER}
      - T51DB_PASS=${T51DB_PASS}
    networks:
      t51Net:
        ipv4_address: ${T51Back_IP}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/actuator/health && echo servicesAlive"]
      interval: 20s
      retries: 5



  front:
    profiles: ["app"]
    container_name: ${FRONT_SERVICE_NAME}
    build: ./front
    image: ${FRONT_IMAGE}
    expose:
      - "80"
    environment:
      - VIRTUAL_HOST=${MY_DOMAIN}
      - LETSENCRYPT_HOST=${MY_DOMAIN}
      - LETSENCRYPT_EMAIL=${MY_EMAIL}
      - VIRTUAL_PORT=80
    volumes:      
      - ./front/config/config-${ENV}.json:/usr/share/nginx/html/assets/config.json
    networks:
      t51Net:
        ipv4_address: ${FRONT_IP}
    depends_on:
      back:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1 && echo servicesAlive"]
      interval: 20s
      retries: 5


