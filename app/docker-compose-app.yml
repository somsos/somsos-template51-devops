
services:

  db:
    profiles: ["app"]
    container_name: ${DB_SERVER}
    image: ${DB_IMAGE}
    command: ["postgres", "-c", "log_statement=all"]
    networks:
      t51Net:
        ipv4_address: ${DB_IP}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ${DB_VOLUME}:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_SCHEMA}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    healthcheck:
      test: ["CMD-SHELL", "PGDATABASE=${DB_SCHEMA} pg_isready -U ${DB_USER} -h localhost"]
      interval: 20s
      timeout: 5s
      retries: 5


  back:
    profiles: ["app"]
    container_name: ${BACK_NAME}
    image: ${BACK_IMAGE}
    build:
      context: ./back
      dockerfile: back.dockerfile
      args:
        TEST: 1   # Ignore just for testing
    expose:
      - "8080"
    environment:
      - VIRTUAL_HOST=api.${MY_DOMAIN}
      - LETSENCRYPT_HOST=api.${MY_DOMAIN}
      - LETSENCRYPT_EMAIL=${MY_EMAIL}
      - VIRTUAL_PORT=8080
      # DB connection data
      - DB_SERVER=${DB_SERVER}
      - DB_SCHEMA=${DB_SCHEMA}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    networks:
      t51Net:
        ipv4_address: ${BACK_IP}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/actuator/health && echo servicesAlive"]
      interval: 20s
      retries: 5



  front:
    profiles: ["app"]
    container_name: ${FRONT_NAME}
    build:
      context: ./front
      args:
        BACK_URL: ${BACK_URL}
      dockerfile: front.dockerfile
    image: ${FRONT_IMAGE}
    expose:
      - "80"
    environment:
      - VIRTUAL_HOST=${MY_DOMAIN}
      - LETSENCRYPT_HOST=${MY_DOMAIN}
      - LETSENCRYPT_EMAIL=${MY_EMAIL}
      - VIRTUAL_PORT=80
    networks:
      t51Net:
        ipv4_address: ${FRONT_IP}
    depends_on:
      back:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1 && echo servicesAlive"]
      interval: 20s
      retries: 5
