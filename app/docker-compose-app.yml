
services:

  db:
    profiles: ["app", "all"]
    container_name: ${DB_SERVER}
    image: ${DB_IMAGE}
    command: ["postgres", "-c", "log_statement=all"]
    networks:
      t51Net:
        ipv4_address: ${DB_IP}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ${DB_VOLUME}:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_SCHEMA}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    healthcheck:
      test: ["CMD-SHELL", "PGDATABASE=${DB_SCHEMA} pg_isready -U ${DB_USER} -h localhost"]
      interval: 20s
      timeout: 5s
      retries: 5


  back:
    profiles: ["app", "all"]
    container_name: ${BACK_NAME}
    image: ${BACK_IMAGE}
    build:
      context: ./back
      dockerfile: back.dockerfile
      args:
        IMAGE_MVN: ${IMAGE_MVN}
        IMAGE_JAVA: ${IMAGE_JAVA}
    expose:
      - "8080"
    environment:
      - VIRTUAL_HOST=api.${MY_DOMAIN}
      - LETSENCRYPT_HOST=api.${MY_DOMAIN}
      - LETSENCRYPT_EMAIL=${MY_EMAIL}
      - VIRTUAL_PORT=8080
      # DB connection data
      - DB_SERVER=${DB_SERVER}
      - DB_SCHEMA=${DB_SCHEMA}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    networks:
      t51Net:
        ipv4_address: ${BACK_IP}
   #depends_on:
   #  db:
   #    condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/actuator/health && echo servicesAlive"]
      interval: 20s
      retries: 5



  front:
    profiles: ["app", "all"]
    container_name: ${FRONT_NAME}
    build:
      context: ./front
      args:
        BACK_URL: ${BACK_URL}
        IMAGE_NODE: ${IMAGE_NODE}
        IMAGE_NGINX: ${IMAGE_NGINX}
      dockerfile: front.dockerfile
    image: ${FRONT_IMAGE}
    expose:
      - "80"
    environment:
      - VIRTUAL_HOST=${MY_DOMAIN}
      - LETSENCRYPT_HOST=${MY_DOMAIN}
      - LETSENCRYPT_EMAIL=${MY_EMAIL}
      - VIRTUAL_PORT=80
    networks:
      t51Net:
        ipv4_address: ${FRONT_IP}
   #depends_on:
   #  back:
   #    condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1 && echo servicesAlive"]
      interval: 20s
      retries: 5


## Maintenance

# CAUTION: 
#   Do not try to use host-volumes to get the source code, because DinD and
#   volumes makes things complicated. It happened me that it was working and
#   suddenly stopped working. better use temporal images.
# OPTIONS: 
#   docker compose run --rm --build db_utils deploy
#   docker compose run --rm --build db_utils rollback
#   docker compose run --rm --build db_utils backup
#   docker compose run --rm --build db_utils restore
  db_utils:
    profiles: ["devops-util"]
    container_name: temp_db_migrate
    image: db_utils:1
    build:
      args:
        DB_MIG_IMAGE: ${DB_MIG_IMAGE}
      context: ./db
      dockerfile: ./db_utils.dockerfile
    environment:
      - PGUSER=${DB_USER}
      - PGPASSWORD=${DB_PASS}
      - PGDATABASE=${DB_SCHEMA}
      - PGHOST=${DB_SERVER}
      - PGPORT=5432
      - LIQUIBASE_COMMAND_USERNAME=${DB_USER}
      - LIQUIBASE_COMMAND_PASSWORD=${DB_PASS}
      - LIQUIBASE_COMMAND_URL=jdbc:postgresql://${DB_SERVER}:5432/${DB_SCHEMA}
      - LIQUIBASE_COMMAND_CHANGELOG_FILE=./changelog.xml
      - TZ=America/Mexico_City
    entrypoint: [ "bash", "/db_utils.entrypoint.sh" ]
    networks:
      - t51Net
    restart: "no"
    volumes:
      - ../workspace/Database-Backup:/t51/app/db/backups
      - /etc/localtime:/etc/localtime:ro
    #depends_on:
    #  db:                              # AVOID THIS, IT MIGHT RECREATE THE DATABASE VOLUME ¡¡DELETING!! ALL
    #    condition: service_healthy


# OPTIONS: 
#   docker compose run --rm --build back_utils unitary_tests
#   docker compose run --rm --build back_utils integration_tests
#   docker compose run --rm --build back_utils e2e_tests
  back_utils:
    profiles: ["devops-util"]
    container_name: temp_back_tests
    image: back_utils:1
    user: "${UID}:${GID}"
    build:
      context: ./back
      dockerfile: back_utils.dockerfile
      args:
        IMAGE_MVN: ${IMAGE_MVN}
        IMAGE_JAVA: ${IMAGE_JAVA}
    volumes:
      # - ./back/back_utils.entrypoint.sh:/opt/back_utils.entrypoint.sh:ro        # AVOID THIS, IN DnD IT MIGHT NOT WORK, BETTER COPY IT IN THE DOCKERFILE
      -  ${HOME}/.m2:/root/.m2
      # REPORTS
      - ./back/test_reports/0overall:/opt/template51/tests_overall
      - ./back/test_reports/adapter:/opt/template51/adapter/target/surefire-reports
      - ./back/test_reports/common:/opt/template51/common/target/surefire-reports
      - ./back/test_reports/product:/opt/template51/product/target/surefire-reports
      - ./back/test_reports/user:/opt/template51/user/target/surefire-reports
      - ./back/test_reports/t51-parent-commons:/opt/template51/t51-parent-commons/target/surefire-reports
      
    entrypoint: [ "bash", "/opt/back_utils.entrypoint.sh" ]
