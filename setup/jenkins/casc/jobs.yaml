
jobs:
  - script: >
      pipelineJob('Backend-Deploy-v1') {
        definition {
          cps {
            script('''
              pipeline {
                agent { label 'built-in' }
                stages {
                stage('1/3: Download') {
                    steps {
                      sh \'\'\'
                        source /var/jenkins_home/workspace/back/1-download.sh
                      \'\'\'
                    }
                  }


                  stage('2/3: Build') {
                    steps {
                      sh \'\'\'
                        source /var/jenkins_home/workspace/back/2-build.sh
                      \'\'\'
                    }
                  }


                  stage('3/3: Deploy') {
                    steps {
                      sh \'\'\'
                        source /var/jenkins_home/workspace/back/3-deploy.sh
                      \'\'\'
                    }
                  }


                }
              }
            '''.stripIndent())
          }
        }
      }
  - script: >
      pipelineJob('Frontend-Deploy-v1') {
        definition {
          cps {
            script('''
              pipeline {
                agent { label 'built-in' }
                stages {
                stage('1/3: Download') {
                    steps {
                      sh \'\'\'
                        source /var/jenkins_home/workspace/front/1f-download.sh
                      \'\'\'
                    }
                  }


                  stage('2/3: Build') {
                    steps {
                      sh \'\'\'
                        source /var/jenkins_home/workspace/front/2f-build.sh
                      \'\'\'
                    }
                  }


                  stage('3/3: Deploy') {
                    steps {
                      sh \'\'\'
                        source /var/jenkins_home/workspace/front/3f-deploy.sh
                      \'\'\'
                    }
                  }


                }
              }
            '''.stripIndent())
          }
        }
      }

  - script: |
      pipelineJob('Docker-Control') {
        description('Manage Docker services')
        
        parameters {
          choiceParam('ACTION', ['up -d --wait', 'stop', 'restart'], 'Select action')
          choiceParam('SERVICE', ['db', 'back', 'front', 'gitea', 'reverse-proxy', 'db_backup'], 'Select service')
        }

        definition {
          cps {
            // --- Pipeline Logic (Jenkins Pipeline) ---
            script('''
              pipeline {
                agent { label 'built-in' }
                stages {
                  
                  stage('Guard Rail') {
                    steps {
                      input message: 'Are you sure you want to deploy?', ok: 'Yes, proceed!'
                    }
                  }

                  stage('Download') {
                    steps {
                      sh \'\'\'
                        source $DEVOPS_WORKDIR/docker-control/1dc-download.sh
                      \'\'\'
                    }
                  }

                  stage('Docker Compose Action') {
                    steps {
                      sh "cd $DEVOPS_WORKDIR/docker-control/$BUILD_NUMBER && docker compose ^${params.ACTION} ^${params.SERVICE}"
                    }
                  }

                  stage('Verify Status') {
                    steps {
                      sh \'\'\'
                        cd $DEVOPS_WORKDIR/docker-control/$BUILD_NUMBER
                        docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Size}}'
                      \'\'\'
                    }

                  }
                }
              }
            '''.stripIndent())
          }
        }
      }

  - script: >
      pipelineJob('Database-Deploy-v1') {
        description('Migrate database to next version.')

        definition {
          cps {
            script('''
              pipeline {
                agent { label 'built-in' }
                stages {
                   
                  stage('Guard Rail') {
                    steps {
                      input message: 'Are you sure you want to deploy?', ok: 'Yes, proceed!'
                    }
                  }
                  
                  stage('1/2: Download') {
                    steps {
                      sh \'\'\'
                        source /var/jenkins_home/workspace/db-mig-deploy/1md-download-devops-repo.sh
                      \'\'\'
                    }
                  }


                  stage('2/2: Migrate') {
                    steps {
                      sh \'\'\'
                        source /var/jenkins_home/workspace/db-mig-deploy/2md-migrate-deploy.sh
                      \'\'\'
                    }
                  }

                }
              }
            '''.stripIndent())
          }
        }
      }

  - script: >
      pipelineJob('Database-Rollback-v1') {
        description('Rollback database to previous version.')

        definition {
          cps {
            script('''
              pipeline {
                agent { label 'built-in' }
                stages {
                   
                   stage('Guard Rail') {
                      steps {
                          input message: 'Are you sure you want to deploy?', ok: 'Yes, proceed!'
                      }
                   }
                  
                  stage('1/2: Download') {
                    steps {
                      sh \'\'\'
                        source /var/jenkins_home/workspace/db-mig-rollback/1mr-download-devops-repo.sh
                      \'\'\'
                    }
                  }

                  stage('2/2: Build') {
                    steps {
                      sh \'\'\'
                        source /var/jenkins_home/workspace/db-mig-rollback/2mr-migrate-rollback.sh
                      \'\'\'
                    }
                  }

                }
              }
            '''.stripIndent())
          }
        }
      }
