
jobs:
  - script: >
      pipelineJob('t51Back-v6') {
        definition {
          cps {
            script('''
              pipeline {
                agent { label 'built-in' }
                stages {
                stage('1/3: Download') {
                    steps {
                      sh \'\'\'
                        source /var/jenkins_home/workspace/back/1-download.sh
                      \'\'\'
                    }
                  }


                  stage('2/3: Build') {
                    steps {
                      sh \'\'\'
                        source /var/jenkins_home/workspace/back/2-build.sh
                      \'\'\'
                    }
                  }


                  stage('3/3: Deploy') {
                    steps {
                      sh \'\'\'
                        source /var/jenkins_home/workspace/back/3-deploy.sh
                      \'\'\'
                    }
                  }


                }
              }
            ''')
          }
        }
      }
  - script: >
      pipelineJob('t51Front-v2') {
        definition {
          cps {
            script('''
              pipeline {
                agent any
                stages {
                stage('1/3: Download') {
                    steps {
                      sh \'\'\'
                        source /var/jenkins_home/workspace/front/1f-download.sh
                      \'\'\'
                    }
                  }


                  stage('2/3: Build') {
                    steps {
                      sh \'\'\'
                        source /var/jenkins_home/workspace/front/2f-build.sh
                      \'\'\'
                    }
                  }


                  stage('3/3: Deploy') {
                    steps {
                      sh \'\'\'
                        source /var/jenkins_home/workspace/front/3f-deploy.sh
                      \'\'\'
                    }
                  }


                }
              }
            ''')
          }
        }
      }

  - script: |
      pipelineJob('t51-Docker-Control-v6') {
        description('Manage Docker services')
        
        parameters {
          choiceParam('ACTION', ['up -d --wait', 'stop', 'restart'], 'Select action')
          choiceParam('SERVICE', ['db', 'back', 'front', 'gitea', 'reverse-proxy', 'db_backup'], 'Select service')
        }

        definition {
          cps {
            // --- Pipeline Logic (Jenkins Pipeline) ---
            script('''
              pipeline {
                agent { label 'built-in' }
                stages {
                  stage('Download') {
                    steps {
                      sh \'\'\'
                        source $DEVOPS_WORKDIR/docker-control/1dc-download.sh
                      \'\'\'
                    }
                  }

                  stage('Docker Compose Action') {
                    steps {
                      sh "cd $DEVOPS_WORKDIR/docker-control/$BUILD_NUMBER && docker compose ^${params.ACTION} ^${params.SERVICE}"
                    }
                  }

                  stage('Verify Status') {
                    steps {
                      sh \'\'\'
                        cd $DEVOPS_WORKDIR/docker-control/$BUILD_NUMBER
                        docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Size}}'
                      \'\'\'
                    }

                  }
                }
              }
            '''.stripIndent())
          }
        }
      }
