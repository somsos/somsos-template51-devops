jobs:
  - script: >
      pipelineJob('Frontend-Deploy-v1') {

        triggers {
          genericTrigger {
            token("${FRONT_NAME}-${SHARED_TOKEN}")
            printPostContent(false)
            printContributedVariables(false)
            causeString('Triggered by Gitea Webhook')
          }
        }

        definition {
          cps {
            script('''
              pipeline {
                agent { label 'built-in' }
                options {
                    ansiColor('xterm')
                }

                
                stages {

                  stage('1/3: Download') {
                    steps {
                      sh \'\'\'
                        source $WORKSPACE/1fd-download.sh
                      \'\'\'
                    }
                  }

                  stage('2/3: Build Image') {
                    steps {
                      sh \'\'\'
                        source $WORKSPACE/2fd-build-image.sh
                      \'\'\'
                    }
                  }

                  stage('3/3: Deploy') {
                    steps {
                      sh \'\'\'
                        source $WORKSPACE/3fd-deploy.sh
                      \'\'\'
                    }
                  }

                }

                post {
                  failure {
                    sh \'\'\'
                      source "/var/jenkins_home/workspace/0_scripts/temp_env_file_functions.sh"
                      remove_copied_env_file "$WORKSPACE/$BUILD_NUMBER/.env"
                    \'\'\'
                  }
                }
                
              }
            '''.stripIndent())
          }
        }
      }
